name: Website QA Test

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"

jobs:
  test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        device: [desktop, mobile]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install dependencies
        run: |
          mvn -B dependency:go-offline
          mvn -B exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps chromium"

      - name: Run website test
        run: |
          mvn -B -Dbase.url=https://qa.greenlightmedicare.co.uk -Dexpected.text="${{ vars.GREENLIGHT_EXPECT_TEXT }}" -Dexpected.selector="${{ vars.GREENLIGHT_EXPECT_SELECTOR }}" -Ddevice=${{ matrix.device }} test

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-test-${{ matrix.device }}
          path: target/reports/${{ matrix.device }}
