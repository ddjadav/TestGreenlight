name: Website QA Test

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        device: [desktop, mobile]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run website test
        env:
          TEST_URL: https://qa.greenlightmedicare.co.uk
          EXPECT_TEXT: ${{ vars.GREENLIGHT_EXPECT_TEXT }}
          EXPECT_SELECTOR: ${{ vars.GREENLIGHT_EXPECT_SELECTOR }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.4-mini
        run: |
          python run.py --device ${{ matrix.device }} --output-dir outputs/${{ matrix.device }}

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-test-${{ matrix.device }}
          path: outputs/${{ matrix.device }}
